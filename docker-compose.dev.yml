services:
  postgres:
    image: postgres:18
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: GvcLkrWP9x8ey2xI9F
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server --console-address ":9001" /data/
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: lABEgpTa8piMO4wSM91B
      MINIO_BROWSER_REDIRECT_URL: http://localhost/minio/
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1" ]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  kafka:
    image: apache/kafka:4.1.0
    container_name: kafka
    environment:
      # Configure listeners for both docker and host communication
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT

      # Settings required for KRaft mode
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091

      # Listener to use for broker-to-broker communication
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER

      # Required for a single node cluster
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: nc -z localhost 9092 || exit -1
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      SERVER.PORT: 8070
      SERVER_SERVLET_CONTEXT_PATH: /kafka
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: nc -z localhost 8070 || exit -1
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  kafka-topics-init:
    image: apache/kafka:4.1.0
    container_name: kafka-topics-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -ec "
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9093 --list >/dev/null 2>&1; do sleep 2; done &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic tasks-topic --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic inspections-topic --partitions 1 --replication-factor 1
      "
    networks:
      - backend

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse
    environment:
      CLICKHOUSE_USER: root
      CLICKHOUSE_PASSWORD: s4c1A2bgbqK2FJuR20R7
    ports:
      - "8123:8123"
      - "9123:9123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse/
      - ./clickhouse.config.xml:/etc/clickhouse-server/config.d/config.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  clickhouse-db-init:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse-db-init
    environment:
      CLICKHOUSE_USER: root
      CLICKHOUSE_PASSWORD: s4c1A2bgbqK2FJuR20R7
      CLICKHOUSE_DB: analytics_service
    depends_on:
      clickhouse:
        condition: service_healthy
    command: >
      sh -ec "
      until clickhouse-client --host clickhouse --port 9123 -u \"$$CLICKHOUSE_USER\" --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1' >/dev/null 2>&1; do sleep 2; done &&
      clickhouse-client --host clickhouse --port 9123 -u \"$$CLICKHOUSE_USER\" --password \"$$CLICKHOUSE_PASSWORD\" --query \"CREATE DATABASE IF NOT EXISTS $$CLICKHOUSE_DB\"
      "
    networks:
      - backend

  metabase-db-init:
    image: postgres:18
    container_name: metabase-db-init
    environment:
      PGPASSWORD: GvcLkrWP9x8ey2xI9F
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
      until pg_isready -h postgres -U postgres; do sleep 2; done &&
      psql -h postgres -U postgres -d postgres -tAc
      \"SELECT 1 FROM pg_database WHERE datname = 'metabase'\" | grep -q 1 ||
      psql -h postgres -U postgres -d postgres -c 'CREATE DATABASE metabase'
      "
    networks:
      - backend

  postgres-db-init:
    image: postgres:18
    container_name: postgres-db-init
    environment:
      PGPASSWORD: GvcLkrWP9x8ey2xI9F
      POSTGRES_DBS: file_service task_service inspection_service analytics_service brigade_service subscriber_service user_service
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -ec "
      until pg_isready -h postgres -U postgres; do sleep 2; done &&
      for db in $$POSTGRES_DBS; do
        psql -h postgres -U postgres -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname = '$$db'\" | grep -q 1 ||
        psql -h postgres -U postgres -d postgres -c \"CREATE DATABASE \\\"$$db\\\"\";
      done
      "
    networks:
      - backend

  metabase:
    image: metabase/metabase:v0.59.6.3
    container_name: metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: postgres
      MB_DB_PASS: GvcLkrWP9x8ey2xI9F
      MB_SITE_NAME: Энергоконтроль
      MB_SITE_LOCALE: ru
      MB_SITE_URL: ${MB_SITE_URL:-http://localhost/metabase/}
    ports:
      - "3000:3000"
    depends_on:
      metabase-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend

  metabase-init:
    image: metabase-init:latest
    container_name: metabase-init
    build:
      context: ./metabase-init
      dockerfile: Dockerfile
    environment:
      METABASE_URL: http://metabase:3000
      METABASE_ADMIN_EMAIL: admin@example.com
      METABASE_ADMIN_PASSWORD: MetabaseAdmin123
      METABASE_ADMIN_FIRST_NAME: Демо
      METABASE_ADMIN_LAST_NAME: Администратор
      METABASE_COLLECTION_NAME: Аналитика энергоконтроля
      METABASE_CLICKHOUSE_NAME: Analytics BI
      METABASE_CLICKHOUSE_HOST: clickhouse
      METABASE_CLICKHOUSE_PORT: 8123
      METABASE_CLICKHOUSE_DB: analytics_service
      METABASE_CLICKHOUSE_USER: root
      METABASE_CLICKHOUSE_PASSWORD: s4c1A2bgbqK2FJuR20R7
    depends_on:
      metabase:
        condition: service_healthy
      clickhouse-db-init:
        condition: service_completed_successfully
    networks:
      - backend

  swagger-gateway:
    image: swagger-gateway:latest
    container_name: swagger-gateway
    build:
      context: ./swagger-gateway
      dockerfile: Dockerfile
    depends_on:
      file-service:
        condition: service_started
      analyzer-service:
        condition: service_started
      task-service:
        condition: service_started
      inspection-service:
        condition: service_started
      analytics-service:
        condition: service_started
      brigade-service:
        condition: service_started
      subscriber-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - backend

  nginx:
    image: nginx:1.29
    tty: true
    container_name: nginx
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: service nginx status || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      minio:
        condition: service_healthy
      kafka-ui:
        condition: service_healthy
      grafana:
        condition: service_started
      metabase:
        condition: service_healthy
      swagger-gateway:
        condition: service_started
      file-service:
        condition: service_started
      analyzer-service:
        condition: service_started
      task-service:
        condition: service_started
      inspection-service:
        condition: service_started
      analytics-service:
        condition: service_started
      brigade-service:
        condition: service_started
      subscriber-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.7.2
    container_name: prometheus
    depends_on:
      file-service:
        condition: service_started
      task-service:
        condition: service_started
      inspection-service:
        condition: service_started
      analytics-service:
        condition: service_started
      brigade-service:
        condition: service_started
      subscriber-service:
        condition: service_started
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend

  grafana:
    image: grafana/grafana-enterprise:12.2
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana.dev.ini:/etc/grafana/grafana.ini
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - backend

  file-service:
    image: file-service:latest
    container_name: file-service
    build:
      context: ../file-service
      dockerfile: Dockerfile
    environment:
      ENV: dev
      JWT_SECRET: dev-user-service-secret
      MINIO_USER: root
      MINIO_PASSWORD: lABEgpTa8piMO4wSM91B
      POSTGRES_PASSWORD: GvcLkrWP9x8ey2xI9F
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    networks:
      - backend

  analyzer-service:
    image: analyzer-service:latest
    container_name: analyzer-service
    build:
      context: ../analyzer-service
      dockerfile: Dockerfile
    networks:
      - backend

  task-service:
    image: task-service:latest
    container_name: task-service
    build:
      context: ../task-service
      dockerfile: Dockerfile
    environment:
      ENV: dev
      JWT_SECRET: dev-user-service-secret
      POSTGRES_PASSWORD: GvcLkrWP9x8ey2xI9F
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend

  inspection-service:
    image: inspection-service:latest
    container_name: inspection-service
    build:
      context: ../inspection-service
      dockerfile: Dockerfile
    environment:
      ENV: dev
      JWT_SECRET: dev-user-service-secret
      POSTGRES_PASSWORD: GvcLkrWP9x8ey2xI9F
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend

  analytics-service:
    image: analytics-service:latest
    container_name: analytics-service
    build:
      context: ../analytics-service
      dockerfile: Dockerfile
    environment:
      ENV: dev
      JWT_SECRET: dev-user-service-secret
      POSTGRES_PASSWORD: GvcLkrWP9x8ey2xI9F
      CLICKHOUSE_USER: root
      CLICKHOUSE_PASSWORD: s4c1A2bgbqK2FJuR20R7
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-init:
        condition: service_completed_successfully
      clickhouse-db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend

  brigade-service:
    image: brigade-service:latest
    container_name: brigade-service
    build:
      context: ../brigade-service
      dockerfile: Dockerfile
    environment:
      ENV: dev
      JWT_SECRET: dev-user-service-secret
      POSTGRES_PASSWORD: GvcLkrWP9x8ey2xI9F
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend

  subscriber-service:
    image: subscriber-service:latest
    container_name: subscriber-service
    build:
      context: ../subscriber-service
      dockerfile: Dockerfile
    environment:
      ENV: dev
      JWT_SECRET: dev-user-service-secret
      POSTGRES_PASSWORD: GvcLkrWP9x8ey2xI9F
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend

  user-service:
    image: user-service:latest
    container_name: user-service
    build:
      context: ../user-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:GvcLkrWP9x8ey2xI9F@postgres:5432/user_service
      JWT_SECRET: dev-user-service-secret
      JWT_EXPIRES_IN: 3600
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-init:
        condition: service_completed_successfully
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  kafka_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
